<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Recorder">
<title>Voice Recorder</title>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f0;
    --muted: #666;
    --accent: #ff3b30;
    --accent-dim: rgba(255,59,48,0.15);
    --safe-top: env(safe-area-inset-top, 20px);
    --safe-bottom: env(safe-area-inset-bottom, 20px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, 'SF Pro Display', sans-serif; overflow: hidden; }
  body { display: flex; flex-direction: column; padding-top: var(--safe-top); padding-bottom: var(--safe-bottom); }

  header {
    padding: 16px 24px 8px;
    display: flex; align-items: center; justify-content: space-between;
  }
  header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
  .count-badge {
    background: var(--surface2); border-radius: 20px;
    padding: 4px 12px; font-size: 13px; color: var(--muted);
  }

  .center-zone {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 28px;
    padding: 0 24px;
  }

  .timer { font-size: 64px; font-weight: 200; letter-spacing: -2px; font-variant-numeric: tabular-nums; color: var(--text); }
  .timer.active { color: var(--accent); }

  .waveform { display: flex; align-items: center; gap: 3px; height: 48px; }
  .wbar { width: 3px; border-radius: 2px; background: var(--surface2); min-height: 4px; transition: height 0.08s ease; }
  .wbar.live { background: var(--accent); }

  .rec-btn {
    width: 80px; height: 80px; border-radius: 50%;
    border: 3px solid var(--accent);
    background: transparent; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.12s, background 0.12s;
    position: relative;
  }
  .rec-btn:active { transform: scale(0.93); }
  .rec-btn .inner {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--accent); transition: border-radius 0.2s, width 0.2s, height 0.2s;
  }
  .rec-btn.recording .inner { border-radius: 6px; width: 28px; height: 28px; }
  .rec-btn.recording { background: var(--accent-dim); }

  .sub-btns { display: flex; gap: 40px; align-items: center; }
  .sub-btn {
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--surface2); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; color: var(--text); transition: opacity 0.15s, transform 0.12s;
  }
  .sub-btn:active { transform: scale(0.92); }
  .sub-btn:disabled { opacity: 0.25; pointer-events: none; }
  .sub-btn svg { width: 22px; height: 22px; fill: currentColor; }

  .status-label { font-size: 14px; color: var(--muted); letter-spacing: 0.02em; min-height: 20px; }
  .status-label.rec { color: var(--accent); }

  .list-zone {
    max-height: 42vh;
    overflow-y: auto;
    padding: 0 16px 16px;
    -webkit-overflow-scrolling: touch;
  }
  .list-zone:empty::after {
    content: "Recordings will appear here";
    display: block; text-align: center;
    padding: 24px; font-size: 14px; color: var(--muted);
  }

  .rec-item {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 14px;
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .rec-top { display: flex; align-items: center; gap: 10px; }
  .rec-icon {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; color: var(--accent); font-size: 16px;
  }
  .rec-info { flex: 1; min-width: 0; }
  .rec-name { font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rec-dur { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .rec-actions { display: flex; gap: 8px; }
  .act-btn {
    flex: 1; padding: 8px; border-radius: 10px; border: none;
    background: var(--surface2); color: var(--text);
    font-size: 13px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 5px;
    transition: opacity 0.12s;
  }
  .act-btn:active { opacity: 0.6; }
  .act-btn.del { color: var(--accent); }
  audio { width: 100%; height: 32px; border-radius: 8px; }
  audio::-webkit-media-controls-panel { background: var(--surface2); }

  .perm-banner {
    margin: 0 16px 12px;
    padding: 12px 16px; border-radius: 12px;
    background: rgba(255,59,48,0.12); border: 0.5px solid rgba(255,59,48,0.3);
    font-size: 13px; color: #ff6b63; display: none;
  }
</style>
</head>
<body>

<header>
  <h1>Recorder</h1>
  <span class="count-badge" id="countBadge">0 clips</span>
</header>

<div class="center-zone">
  <div class="waveform" id="waveform">
    <!-- bars injected by JS -->
  </div>
  <div class="timer" id="timer">0:00</div>
  <div class="status-label" id="statusLabel">Tap to record</div>
  <button class="rec-btn" id="recBtn" onclick="toggleRecord()" aria-label="Record">
    <div class="inner"></div>
  </button>
  <div class="sub-btns">
    <button class="sub-btn" id="pauseBtn" onclick="togglePause()" disabled aria-label="Pause">
      <svg viewBox="0 0 24 24" id="pauseIcon"><rect x="5" y="3" width="4" height="18" rx="1"/><rect x="15" y="3" width="4" height="18" rx="1"/></svg>
    </button>
    <button class="sub-btn" id="deleteLastBtn" onclick="deleteLast()" disabled aria-label="Delete last" style="color:var(--accent)">
      <svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>
    </button>
  </div>
</div>

<div class="perm-banner" id="permBanner">Microphone access denied — please allow it in Settings > Safari > Microphone.</div>

<div class="list-zone" id="listZone"></div>

<script>
const BAR_COUNT = 28;
const waveEl = document.getElementById('waveform');
const bars = [];
for (let i = 0; i < BAR_COUNT; i++) {
  const b = document.createElement('div');
  b.className = 'wbar';
  b.style.height = '4px';
  waveEl.appendChild(b);
  bars.push(b);
}

let mediaRecorder = null, chunks = [], stream = null;
let audioCtx = null, analyser = null, animFrame = null;
let timerInterval = null, seconds = 0, isPaused = false, isRecording = false;
let recordings = [];

const timerEl = document.getElementById('timer');
const statusEl = document.getElementById('statusLabel');
const recBtn = document.getElementById('recBtn');
const pauseBtn = document.getElementById('pauseBtn');
const delLastBtn = document.getElementById('deleteLastBtn');
const countBadge = document.getElementById('countBadge');

function fmt(s) {
  const m = Math.floor(s / 60);
  return m + ':' + String(s % 60).padStart(2, '0');
}

async function toggleRecord() {
  if (isRecording) {
    stopRecording();
  } else {
    await startRecording();
  }
}

async function startRecording() {
  document.getElementById('permBanner').style.display = 'none';
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (e) {
    document.getElementById('permBanner').style.display = 'block';
    return;
  }
  audioCtx = new AudioContext();
  const src = audioCtx.createMediaStreamSource(stream);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 64;
  src.connect(analyser);

  chunks = [];
  mediaRecorder = new MediaRecorder(stream);
  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
  mediaRecorder.onstop = finalise;
  mediaRecorder.start(100);

  isRecording = true; isPaused = false;
  seconds = 0; timerEl.textContent = '0:00';
  timerEl.classList.add('active');
  timerInterval = setInterval(() => { seconds++; timerEl.textContent = fmt(seconds); }, 1000);
  recBtn.classList.add('recording');
  statusEl.textContent = 'Recording…'; statusEl.className = 'status-label rec';
  pauseBtn.disabled = false;
  bars.forEach(b => b.classList.add('live'));
  animateWave();
}

function stopRecording() {
  if (!mediaRecorder) return;
  clearInterval(timerInterval);
  cancelAnimationFrame(animFrame);
  mediaRecorder.stop();
  stream.getTracks().forEach(t => t.stop());
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  isRecording = false; isPaused = false;
  recBtn.classList.remove('recording');
  pauseBtn.disabled = true;
  pauseBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="3" width="4" height="18" rx="1"/><rect x="15" y="3" width="4" height="18" rx="1"/></svg>';
  statusEl.textContent = 'Saved'; statusEl.className = 'status-label';
  timerEl.classList.remove('active');
  bars.forEach(b => { b.classList.remove('live'); b.style.height = '4px'; });
  setTimeout(() => { statusEl.textContent = 'Tap to record'; }, 1500);
}

function togglePause() {
  if (!mediaRecorder) return;
  if (!isPaused) {
    mediaRecorder.pause();
    clearInterval(timerInterval);
    cancelAnimationFrame(animFrame);
    bars.forEach(b => b.style.height = '4px');
    pauseBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>';
    statusEl.textContent = 'Paused'; statusEl.className = 'status-label';
    isPaused = true;
  } else {
    mediaRecorder.resume();
    timerInterval = setInterval(() => { seconds++; timerEl.textContent = fmt(seconds); }, 1000);
    pauseBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="3" width="4" height="18" rx="1"/><rect x="15" y="3" width="4" height="18" rx="1"/></svg>';
    statusEl.textContent = 'Recording…'; statusEl.className = 'status-label rec';
    isPaused = false;
    animateWave();
  }
}

function animateWave() {
  if (!analyser) return;
  const data = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(data);
  bars.forEach((b, i) => {
    const idx = Math.floor(i * data.length / BAR_COUNT);
    b.style.height = Math.max(4, (data[idx] / 255) * 44) + 'px';
  });
  animFrame = requestAnimationFrame(animateWave);
}

function finalise() {
  const blob = new Blob(chunks, { type: 'audio/webm' });
  const url = URL.createObjectURL(blob);
  recordings.unshift({ url, blob, name: 'Recording ' + (recordings.length + 1), duration: seconds });
  delLastBtn.disabled = false;
  renderList();
}

function deleteLast() {
  if (!recordings.length) return;
  URL.revokeObjectURL(recordings[0].url);
  recordings.shift();
  if (!recordings.length) delLastBtn.disabled = true;
  renderList();
}

function deleteRecording(i) {
  URL.revokeObjectURL(recordings[i].url);
  recordings.splice(i, 1);
  if (!recordings.length) delLastBtn.disabled = true;
  renderList();
}

function downloadRecording(i) {
  const a = document.createElement('a');
  a.href = recordings[i].url;
  a.download = recordings[i].name.replace(/ /g, '_') + '.webm';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

function renderList() {
  countBadge.textContent = recordings.length + (recordings.length === 1 ? ' clip' : ' clips');
  const el = document.getElementById('listZone');
  if (!recordings.length) { el.innerHTML = ''; return; }
  el.innerHTML = recordings.map((r, i) => `
    <div class="rec-item">
      <div class="rec-top">
        <div class="rec-icon">♪</div>
        <div class="rec-info">
          <div class="rec-name">${r.name}</div>
          <div class="rec-dur">${fmt(r.duration)}</div>
        </div>
      </div>
      <audio controls src="${r.url}"></audio>
      <div class="rec-actions">
        <button class="act-btn" onclick="downloadRecording(${i})">⬇ Save</button>
        <button class="act-btn del" onclick="deleteRecording(${i})">✕ Delete</button>
      </div>
    </div>
  `).join('');
}
</script>
</body>
</html>
